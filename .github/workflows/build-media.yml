name: Build Hidden Leaf Kitchen media

on:
  workflow_dispatch:
  issues:
    types: [opened]
  push:
    paths:
      - ".github/workflows/build-media.yml"

permissions:
  contents: write
  issues: write

concurrency:
  group: hidden-leaf-media-publish
  cancel-in-progress: false

jobs:
  build-media:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          python -m pip install --quiet gdown
          ffmpeg -version | head -1
          ffprobe -version | head -1

      - name: Download, convert and validate videos
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          report_error() {
            local status="$?"
            gh issue comment 3 --body "MEDIA_BUILD_ERROR status=${status} line=$1 command: $2"
            exit "$status"
          }
          trap 'report_error "$LINENO" "$BASH_COMMAND"' ERR

          rm -rf raw videos
          mkdir -p raw videos

          download() {
            local id="$1"
            local dest="$2"
            echo "Downloading ${dest}"
            if ! gdown --fuzzy --quiet "https://drive.google.com/file/d/${id}/view" -O "$dest"; then
              curl -L --fail --retry 4 --retry-delay 3 \
                -A "Mozilla/5.0" \
                "https://drive.usercontent.google.com/download?id=${id}&export=download&confirm=t" \
                -o "$dest"
            fi
            test -s "$dest"
            ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of csv=p=0 "$dest" >/dev/null
          }

          convert() {
            local src="$1"
            local dest="$2"
            echo "Converting ${dest}"
            ffmpeg -nostdin -hide_banner -loglevel error -y -i "$src" \
              -map 0:v:0 -map '0:a?' \
              -vf "fps=30,scale=720:1280:force_original_aspect_ratio=decrease:flags=lanczos,pad=720:1280:(ow-iw)/2:(oh-ih)/2:color=black,setsar=1,format=yuv420p" \
              -c:v libx264 -preset medium -crf 23 -profile:v high -level 4.1 \
              -c:a aac -b:a 128k -ar 48000 -ac 2 \
              -movflags +faststart "$dest"
          }

          download "1IeH5XS9jZjfWtHMn2gpRhNENKVOjovBP" raw/01.mov
          download "1UQIUoT9WcsI4RmMFnH0jm10bEbTtlNBV" raw/02.mov
          download "1hXHQUjn-325FGens4kkZqkNeA4uW9Aav" raw/03.mp4
          download "10I7VPvF7coByQD0JtGGAxvFMRypSHT7k" raw/04.mov
          download "1eDjti6BrDYp0KBYujupxsrQwNafNnK_3" raw/05.mp4
          download "1daeSeMAJG_Cb14kCQa4TPvAdBZhnm9cG" raw/06.mp4
          download "1cfed-_Vlk8ZohQI_AGVFEfy91Ca7TIZY" raw/07.mp4
          download "14CmESaGb0O5XQWHgH6ym_QxoEVq7lDiN" raw/08.mov
          download "1ZxA6O3MMEwkXwrn6h4Um8nUszIQWfSGx" raw/09.mov
          download "1nqm7Rr0cS9fHoKarinBUuy6sfTeSpGvm" raw/10.mov
          download "158vIQWe7MtFHgiExLRbmeuPloh2Fnf-c" raw/11.mov
          download "1WUGJAMRKRE71yfNSKe3GyPXda5DavGq7" raw/12.mov

          convert raw/01.mov videos/01-chipotle-taco-bell-food-deals.mp4
          convert raw/02.mov videos/02-save-on-taco-bell-orders.mp4
          convert raw/03.mp4 videos/03-discounted-taco-bell-pizza-wings-chipotle.mp4
          convert raw/04.mov videos/04-cheap-taco-bell-fast-food-community.mp4
          convert raw/05.mp4 videos/05-cheaper-wings-loaded-bowls-desserts.mp4
          convert raw/06.mp4 videos/06-cheap-mcdonalds-chick-fil-a-orders.mp4
          convert raw/07.mp4 videos/07-cheap-food-discord-chipotle-pizza.mp4
          convert raw/08.mov videos/08-50-percent-off-uber-eats-mcdonalds.mp4
          convert raw/09.mov videos/09-check-uber-eats-prices-before-ordering.mp4
          convert raw/10.mov videos/10-hidden-leaf-kitchen-discord-tour.mp4
          convert raw/11.mov videos/11-cheap-food-order-proofs.mp4
          convert raw/12.mov videos/12-uber-eats-deal-proofs-food-savings.mp4

          test "$(find videos -maxdepth 1 -type f -name '*.mp4' | wc -l)" -eq 12
          printf '[\n' > videos/manifest.json
          first=1
          for file in videos/*.mp4; do
            vcodec="$(ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of csv=p=0 "$file")"
            acodec="$(ffprobe -v error -select_streams a:0 -show_entries stream=codec_name -of csv=p=0 "$file")"
            pix_fmt="$(ffprobe -v error -select_streams v:0 -show_entries stream=pix_fmt -of csv=p=0 "$file")"
            width="$(ffprobe -v error -select_streams v:0 -show_entries stream=width -of csv=p=0 "$file")"
            height="$(ffprobe -v error -select_streams v:0 -show_entries stream=height -of csv=p=0 "$file")"
            fps="$(ffprobe -v error -select_streams v:0 -show_entries stream=r_frame_rate -of csv=p=0 "$file")"
            duration="$(ffprobe -v error -show_entries format=duration -of csv=p=0 "$file")"
            size="$(stat -c%s "$file")"

            test "$vcodec" = "h264"
            test "$acodec" = "aac"
            test "$pix_fmt" = "yuv420p"
            test "$width" = "720"
            test "$height" = "1280"
            test "$fps" = "30/1"
            test "$size" -lt 104857600
            awk -v d="$duration" 'BEGIN { exit !(d > 0 && d <= 60) }'

            if [ "$first" -eq 0 ]; then printf ',\n' >> videos/manifest.json; fi
            first=0
            printf '  {"file":"%s","sha256":"%s","size":%s,"duration":%s,"video":"%s","audio":"%s","width":%s,"height":%s,"fps":"%s"}' \
              "$(basename "$file")" "$(sha256sum "$file" | cut -d' ' -f1)" "$size" "$duration" "$vcodec" "$acodec" "$width" "$height" "$fps" >> videos/manifest.json
          done
          printf '\n]\n' >> videos/manifest.json

      - name: Publish public media files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add videos
          if git diff --cached --quiet; then
            echo "Videos are already current."
          else
            git commit -m "Publish Postly API-safe Hidden Leaf Kitchen videos"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Report success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment 3 --body "MEDIA_READY $(git rev-parse HEAD) — 12 public H.264/AAC 720x1280 MP4 files published."

      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment 3 --body "MEDIA_BUILD_FAILED for run ${{ github.run_id }}."
